name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: localhost:5000

jobs:
  # ─────────────────────────────────────────────
  # 1. LINT
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python (api)
        run: flake8 api/main.py api/tests/ --max-line-length=100

      - name: Lint Python (worker)
        run: flake8 worker/worker.py --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        run: npm install -g eslint

      - name: Lint JavaScript
        working-directory: frontend
        run: eslint app.js --config eslint.config.cjs

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint --ignore DL3018 api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  # ─────────────────────────────────────────────
  # 2. TEST
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        working-directory: api
        run: |
          pytest tests/ -v \
            --cov=main \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/htmlcov/

  # ─────────────────────────────────────────────
  # 3. BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        run: |
          docker build \
            -t $REGISTRY/api:${{ github.sha }} \
            -t $REGISTRY/api:latest \
            ./api
          docker push $REGISTRY/api:${{ github.sha }}
          docker push $REGISTRY/api:latest

      - name: Build and push worker image
        run: |
          docker build \
            -t $REGISTRY/worker:${{ github.sha }} \
            -t $REGISTRY/worker:latest \
            ./worker
          docker push $REGISTRY/worker:${{ github.sha }}
          docker push $REGISTRY/worker:latest

      - name: Build and push frontend image
        run: |
          docker build \
            -t $REGISTRY/frontend:${{ github.sha }} \
            -t $REGISTRY/frontend:latest \
            ./frontend
          docker push $REGISTRY/frontend:${{ github.sha }}
          docker push $REGISTRY/frontend:latest

      - name: Save image tarballs for scan
        run: |
          docker save $REGISTRY/api:latest     | gzip > /tmp/api.tar.gz
          docker save $REGISTRY/worker:latest  | gzip > /tmp/worker.tar.gz
          docker save $REGISTRY/frontend:latest | gzip > /tmp/frontend.tar.gz

      - name: Upload image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar.gz

  # ─────────────────────────────────────────────
  # 4. SECURITY SCAN
  # ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/

      - name: Load images and retag for scanning
        run: |
          docker load < /tmp/api.tar.gz
          docker load < /tmp/worker.tar.gz
          docker load < /tmp/frontend.tar.gz

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/api:latest"
          format: sarif
          output: trivy-api.sarif
          exit-code: "1"
          severity: CRITICAL
          vuln-type: os
          scanners: vuln

      - name: Scan worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/worker:latest"
          format: sarif
          output: trivy-worker.sarif
          exit-code: "1"
          severity: CRITICAL
          vuln-type: os
          scanners: vuln

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/frontend:latest"
          format: sarif
          output: trivy-frontend.sarif
          exit-code: "1"
          severity: CRITICAL
          vuln-type: os
          scanners: vuln

      - name: Upload API SARIF 
        if: always() && hashFiles('trivy-api.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api
      - name: Upload worker SARIF 
        if: always() && hashFiles('trivy-worker.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-worker.sarif
          category: trivy-worker

      - name: Upload frontend SARIF 
        if: always() && hashFiles('trivy-frontend.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      

  # ─────────────────────────────────────────────
  # 5. INTEGRATION TEST
  # ─────────────────────────────────────────────
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Download image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/

      - name: Load images and retag for compose
        run: |
          docker load < /tmp/api.tar.gz
          docker load < /tmp/worker.tar.gz
          docker load < /tmp/frontend.tar.gz
          docker tag $REGISTRY/api:latest     stage2-api:latest
          docker tag $REGISTRY/worker:latest  stage2-worker:latest
          docker tag $REGISTRY/frontend:latest stage2-frontend:latest

      - name: Create .env for compose
        run: |
          echo "REDIS_PASSWORD=supersecretpassword123" > .env
          echo "FRONTEND_PORT=3000" >> .env
      - name: Override compose to use pre-built images (Python)
        run: |
           echo 'services:' > docker-compose.override.yml
           echo '  api:' >> docker-compose.override.yml
           echo '    image: stage2-api:latest' >> docker-compose.override.yml
           echo '    build: null' >> docker-compose.override.yml
           echo '  worker:' >> docker-compose.override.yml
           echo '    image: stage2-worker:latest' >> docker-compose.override.yml
           echo '    build: null' >> docker-compose.override.yml
           echo '  frontend:' >> docker-compose.override.yml
           echo '    image: stage2-frontend:latest' >> docker-compose.override.yml
           echo '    build: null' >> docker-compose.override.yml
      - name: Verify files exist
        run: |
          echo "=== workspace files ==="
          ls -la
          echo "=== docker-compose-override.yaml ==="
          cat docker-compose.override.yml

      - name: Start full stack
        run: docker compose up -d

      - name: Wait for stack to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 24); do
            if docker compose ps | grep -q "unhealthy"; then
              echo "Attempt $i: some services unhealthy, waiting..."
              sleep 5
            elif docker compose ps | grep "(health: starting)"; then
              echo "Attempt $i: services still starting, waiting..."
              sleep 5
            else
              echo "All services healthy!"
              break
            fi
          done
          docker compose ps

      - name: Submit job and poll for completion
        run: |
          echo "Submitting job..."
          SUBMIT=$(curl -sf -X POST http://localhost:3000/submit)
          echo "Response: $SUBMIT"
          JOB_ID=$(echo $SUBMIT | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          echo "Polling for completion..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Job did not complete in time"
          exit 1

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────
  # 6. DEPLOY (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/

      - name: Load images and retag
        run: |
          docker load < /tmp/api.tar.gz
          docker load < /tmp/worker.tar.gz
          docker load < /tmp/frontend.tar.gz
          docker tag $REGISTRY/api:latest     stage2-api:latest
          docker tag $REGISTRY/worker:latest  stage2-worker:latest
          docker tag $REGISTRY/frontend:latest stage2-frontend:latest


      - name: Rolling deploy
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD || 'supersecretpassword123' }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT || '3000' }}
        run: |
          set -e

          echo "REDIS_PASSWORD=$REDIS_PASSWORD" > .env
          echo "FRONTEND_PORT=$FRONTEND_PORT"  >> .env

          # Write override to use pre-built images
          echo 'services:' > docker-compose.override.yml
          echo '  api:' >> docker-compose.override.yml
          echo '    image: stage2-api:latest' >> docker-compose.override.yml
          echo '    build: null' >> docker-compose.override.yml
          echo '  worker:' >> docker-compose.override.yml
          echo '    image: stage2-worker:latest' >> docker-compose.override.yml
          echo '    build: null' >> docker-compose.override.yml
          echo '  frontend:' >> docker-compose.override.yml
          echo '    image: stage2-frontend:latest' >> docker-compose.override.yml
          echo '    build: null' >> docker-compose.override.yml

          # Start full stack (redis + all services)
          docker compose up -d

          # Wait for redis to be healthy first
          echo "Waiting for Redis..."
          for i in $(seq 1 12); do
            if docker compose ps redis | grep -q "healthy"; then
              echo "Redis is healthy"
              break
            fi
            sleep 5
          done


          # Rolling update — scale api to 2, wait for at least 1 healthy
          docker compose up -d --no-deps --scale api=2 api || true

          # Wait up to 60s for new container health check
          TIMEOUT=60
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            HEALTHY=$(docker compose ps api | grep -c "healthy" || true)
            if [ "$HEALTHY" -ge 1 ]; then
              echo "New API container is healthy after ${ELAPSED}s"
              break
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Health check timed out after ${TIMEOUT}s — aborting deploy, old container still running"
            docker compose up -d --no-deps --scale api=1 api
            exit 1
          fi

          # All healthy — bring down excess and deploy remaining services
          docker compose up -d --no-deps --scale api=1 api
          docker compose up -d --no-deps worker frontend

          echo "Deploy complete."
